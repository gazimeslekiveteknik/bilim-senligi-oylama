<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gazi MTAL - 19 Mayıs Bilim Şenliği Oylama</title>
    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-purple: #bd00ff;
            --neon-pink: #ff00ff;
            --gold-dull: rgba(255, 215, 0, 0.25);
            --gold-bright: #ffd700;
            --bg-dark: #070314;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(189, 0, 255, 0.08), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.08), transparent 30%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }

        .page-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Header: Logo ve Bayrak --- */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .school-logo {
            width: 60px;
            height: 60px;
            /* Çerçeve ve gölge tamamen kaldırıldı */
        }

        .turkish-flag {
            width: 70px;
            height: auto;
            border-radius: 5px;
            animation: waveFlag 3s ease-in-out infinite alternate;
            transform-origin: center left;
        }

        /* --- Ana Başlık --- */
        .title-container {
            margin-top: -5px;
        }

        .main-title {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-purple);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 15px;
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
            letter-spacing: 2px;
        }

        /* --- Temiz Neon Sınır (Border) Animasyonu --- */
        .animated-border-wrapper {
            position: relative;
            border-radius: 12px;
            padding: 2px; /* Çerçeve kalınlığı */
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* İçeriye sızmayan hareketli ışık kaynağı */
        .animated-border-wrapper::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--neon-blue), transparent 25%);
            animation: spinBorder 4s linear infinite;
            z-index: 1;
        }

        /* İkinci kutu için farklı renk, farklı yön ve farklı hız (Senkronizasyonu bozar) */
        .wrapper-2::before {
            background: conic-gradient(transparent, var(--neon-purple), transparent 30%);
            animation: spinBorder 6s linear infinite reverse;
        }

        /* Işığın merkezini kapatan ve sadece kenarları bırakan katı arka plan */
        .animated-border-inner {
            position: relative;
            background: rgba(12, 8, 25, 0.95); /* Mat, koyu arka plan */
            border-radius: 10px; /* Dış kapsayıcıdan 2px küçük */
            padding: 15px;
            z-index: 2;
            height: 100%;
        }

        /* --- Progress Section --- */
        .progress-text {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 5px;
            overflow: hidden;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.8);
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.5s ease-out;
        }

        /* --- Project Panel --- */
        .project-panel {
            text-align: left;
        }

        .panel-info {
            display: flex;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .panel-info:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: var(--neon-blue);
            font-weight: bold;
            margin-right: 10px;
            min-width: 70px;
        }

        .info-value {
            color: white;
            font-weight: 500;
        }

        /* --- Tek Satır Yıldız Sistemi --- */
        .star-rating-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 15px 0;
        }

        .stars-container {
            display: flex;
            flex-wrap: nowrap; /* Asla alt satıra geçmez */
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
        }

        .star {
            font-size: 45px;
            color: var(--gold-dull);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: idleGlow 2s infinite alternate;
        }

        .star.active {
            color: var(--gold-bright);
            animation: activeGlow 1.5s infinite alternate;
            transform: scale(1.1);
        }

        .star:active {
            transform: scale(0.9);
        }

        .rating-feedback {
            margin-top: 10px;
            min-height: 24px;
            font-size: 15px;
            color: #aaa;
            font-weight: 500;
        }

        .rating-feedback span {
            color: var(--gold-bright);
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* --- Gönder Butonu --- */
        .vote-btn-container {
            margin-top: 5px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.4);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:disabled {
            background: #222;
            color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        .submit-btn:not(:disabled):hover {
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.7);
            transform: scale(1.02);
        }

        /* --- Animasyonlar --- */
        @keyframes waveFlag {
            0% { transform: skewY(0deg) scaleY(1); }
            50% { transform: skewY(-2deg) scaleY(1.02); }
            100% { transform: skewY(2deg) scaleY(0.98); }
        }

        @keyframes spinBorder {
            100% { transform: rotate(360deg); }
        }

        @keyframes idleGlow {
            0% { text-shadow: 0 0 2px rgba(255, 215, 0, 0.1); transform: scale(1); }
            100% { text-shadow: 0 0 8px rgba(255, 215, 0, 0.3); transform: scale(1.05); }
        }

        @keyframes activeGlow {
            0% { text-shadow: 0 0 10px var(--gold-bright); }
            100% { text-shadow: 0 0 20px var(--gold-bright), 0 0 30px #ffa500; }
        }

    </style>
</head>
<body>

    <div class="page-container">
        <header class="app-header">
            <img src="logo.gif" alt="Okul Logo" class="school-logo">
            <div class="title-container">
                <h1 class="main-title">19 MAYIS</h1>
                <h2 class="sub-title">BİLİM VE GENÇLİK ŞENLİĞİ</h2>
            </div>
            <img src="image_abb96a.png" alt="Türk Bayrağı" class="turkish-flag">
        </header>

        <div class="animated-border-wrapper">
            <div class="animated-border-inner">
                <p class="progress-text">Günlük Oy Hakkı: <span id="votesUsedDisplay">0</span>/2 Kullanıldı</p>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
            </div>
        </div>

        <div class="animated-border-wrapper wrapper-2">
            <div class="animated-border-inner project-panel">
                <div class="panel-info">
                    <span class="info-label">Proje:</span>
                    <span class="info-value" id="projectName">Yükleniyor...</span>
                </div>
                <div class="panel-info">
                    <span class="info-label">Öğrenci:</span>
                    <span class="info-value" id="studentName">Yükleniyor...</span>
                </div>
            </div>
        </div>

        <section class="star-rating-section">
            <div class="stars-container" id="starsContainer">
                <span class="star" data-value="1" onclick="selectStars(1)">★</span>
                <span class="star" data-value="2" onclick="selectStars(2)">★</span>
                <span class="star" data-value="3" onclick="selectStars(3)">★</span>
                <span class="star" data-value="4" onclick="selectStars(4)">★</span>
                <span class="star" data-value="5" onclick="selectStars(5)">★</span>
            </div>
            <div class="rating-feedback" id="ratingFeedback">
                Puan vermek için yıldızlara dokunun
            </div>
        </section>

        <div class="vote-btn-container">
            <button id="submitVoteBtn" class="submit-btn" onclick="submitVote()" disabled>OYU GÖNDER</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBS-OSazqWy0IZyO0gkyvCHOVlDIa4EH3k",
            authDomain: "bilim-senligi-oylama.firebaseapp.com",
            projectId: "bilim-senligi-oylama",
            storageBucket: "bilim-senligi-oylama.firebasestorage.app",
            messagingSenderId: "759289316087",
            appId: "1:759289316087:web:885560206050005e6d49f2",
            measurementId: "G-83VDG3TC70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global Değişkenler
        let selectedPuan = 0;
        const maxVotes = 2; 
        let currentVotesUsed = 0; 
        let currentProjectId = null;

        const urlParams = new URLSearchParams(window.location.search);
        currentProjectId = urlParams.get('id');

        async function init() {
            const today = new Date().toLocaleDateString();
            const voteData = JSON.parse(localStorage.getItem('voteData')) || { date: today, count: 0, votedProjects: [] };
            
            if(voteData.date !== today) {
                voteData.date = today;
                voteData.count = 0;
                voteData.votedProjects = [];
                localStorage.setItem('voteData', JSON.stringify(voteData));
            }
            
            currentVotesUsed = voteData.count;
            updateProgressUI();

            if (currentProjectId) {
                try {
                    const docRef = doc(db, "projeler", currentProjectId);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        document.getElementById("projectName").textContent = docSnap.data().proje_adi;
                        document.getElementById("studentName").textContent = docSnap.data().ogrenci_adi;
                    } else {
                        document.getElementById("projectName").textContent = "Proje Bulunamadı";
                        document.getElementById("studentName").textContent = "-";
                    }
                } catch (error) {
                    console.error("Hata:", error);
                    document.getElementById("projectName").textContent = "Bağlantı Hatası";
                }
            } else {
                document.getElementById("projectName").textContent = "Karekod Geçersiz";
                document.getElementById("studentName").textContent = "Lütfen karekodu tekrar okutun.";
            }

            if(currentVotesUsed >= maxVotes) {
                document.getElementById("submitVoteBtn").textContent = "GÜNLÜK OY HAKKINIZ DOLDU";
            }
        }

        // Yıldız Seçim Mantığı
        window.selectStars = function(puan) {
            if (currentVotesUsed >= maxVotes) {
                alert("Günlük 2 oy hakkınızı doldurdunuz. Yarın tekrar bekleriz!");
                return;
            }

            const voteData = JSON.parse(localStorage.getItem('voteData'));
            if(voteData && voteData.votedProjects.includes(currentProjectId)) {
                alert("Bu projeye zaten oy verdiniz. Lütfen başka projeleri inceleyin!");
                return;
            }

            selectedPuan = puan;
            
            // Seçilen yıldıza kadar olanları aktif et
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, index) => {
                if (index < puan) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });

            // Geri bildirim metnini güncelle
            document.getElementById('ratingFeedback').innerHTML = `<span>${puan} Puan</span> seçildi`;
            document.getElementById("submitVoteBtn").disabled = false;
        }

        window.submitVote = async function() {
            if (!currentProjectId || selectedPuan === 0) return;

            const btn = document.getElementById("submitVoteBtn");
            btn.disabled = true;
            btn.textContent = "GÖNDERİLİYOR...";

            try {
                const docRef = doc(db, "projeler", currentProjectId);
                await updateDoc(docRef, {
                    toplam_ham_puan: increment(selectedPuan),
                    toplam_oy_sayisi: increment(1)
                });

                const voteData = JSON.parse(localStorage.getItem('voteData'));
                voteData.count++;
                voteData.votedProjects.push(currentProjectId);
                localStorage.setItem('voteData', JSON.stringify(voteData));

                currentVotesUsed = voteData.count;
                updateProgressUI();

                // Başarı Ekranı
                document.querySelector('.star-rating-section').innerHTML = `
                    <div style="padding: 20px; background: rgba(0,255,0,0.1); border-radius: 10px; border: 1px solid rgba(0,255,0,0.3); width: 100%;">
                        <h3 style="color: #0f0; margin-bottom: 5px;">Oyunuz Alındı!</h3>
                        <p style="color: #ddd;">Projeye ${selectedPuan} puan verdiniz.</p>
                    </div>
                `;
                btn.style.display = 'none';

                if(currentVotesUsed >= maxVotes) {
                    setTimeout(() => alert("Bugünkü tüm oy haklarınızı kullandınız. Şenliğe katılımınız için teşekkürler!"), 500);
                }

            } catch (error) {
                console.error("Hata:", error);
                alert("Oy gönderilirken bir hata oluştu. İnternet bağlantınızı kontrol edin.");
                btn.disabled = false;
                btn.textContent = "OYU GÖNDER";
            }
        }

        function updateProgressUI() {
            document.getElementById('votesUsedDisplay').textContent = currentVotesUsed;
            const percentage = (currentVotesUsed / maxVotes) * 100;
            document.getElementById('progressBarFill').style.width = `${percentage}%`;
        }

        init();
    </script>
</body>
</html>
