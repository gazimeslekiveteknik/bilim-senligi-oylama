<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>19 Mayıs Bilim ve Gençlik Şenliği - Oylama</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-purple: #bd00ff;
            --gold-dull: rgba(255, 215, 0, 0.3);
            --gold-bright: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Derin Uzay Arka Planı --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050210;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(0, 229, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(189, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(20, 10, 40, 0.8) 0%, #050210 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
            position: relative;
        }

        /* Arka plan yıldız tanecikleri */
        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 80px 70px, #ddd, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 160px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 250px 90px, #ddd, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 320px 210px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 400px 400px;
            animation: twinkle 4s infinite alternate;
            opacity: 0.6;
        }

        .page-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
        }

        /* --- Header: Logo ve Bayrak --- */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .school-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            animation: spinLogo 10s linear infinite; /* Sadece dönüyor, gölge yok */
        }

        .turkish-flag {
            width: 70px;
            height: auto;
            border-radius: 5px;
            animation: waveFlag 3s ease-in-out infinite alternate;
            transform-origin: center left;
        }

        /* --- Ana Başlık --- */
        .main-title {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px rgba(189, 0, 255, 0.8);
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 14px;
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        /* --- Temiz Neon Sınır (Border) Animasyonu --- */
        .animated-border-wrapper {
            position: relative;
            border-radius: 12px;
            padding: 2px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Işık sadece sınırda gezer */
        .animated-border-wrapper::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--neon-blue), transparent 25%);
            animation: spinBorder 4s linear infinite;
            z-index: 1;
        }

        /* İkinci kutu senkronu bozar */
        .wrapper-2::before {
            background: conic-gradient(transparent, var(--neon-purple), transparent 30%);
            animation: spinBorder 5s linear infinite reverse;
        }

        /* İç kısım karanlık ve yazılar net */
        .animated-border-inner {
            position: relative;
            background: rgba(12, 10, 25, 0.95);
            border-radius: 10px;
            padding: 15px;
            z-index: 2;
            height: 100%;
        }

        /* --- Kutu İçerikleri --- */
        .info-text {
            font-size: 15px;
            color: #ddd;
            font-weight: 600;
        }

        .project-panel {
            text-align: left;
        }
        .project-panel h1 { font-size: 18px; color: #fff; margin-bottom: 5px; }
        .project-panel p { font-size: 15px; color: var(--neon-blue); }

        /* --- Tek Satır Yıldız Sistemi --- */
        .star-rating-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }

        .stars-container {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            gap: 10px;
            padding: 10px 0;
        }

        .star {
            font-size: 50px;
            color: var(--gold-dull);
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.1);
        }

        .star.active {
            color: var(--gold-bright);
            text-shadow: 0 0 15px var(--gold-bright), 0 0 25px rgba(255, 165, 0, 0.8);
            transform: scale(1.15);
            animation: pulseGlow 1.5s infinite alternate;
        }

        /* --- Mesaj ve Yükleniyor Alanı --- */
        #mesajAlani { margin-top: 20px; font-size: 16px; font-weight: bold; display: none; padding: 15px; border-radius: 12px; }
        .success-msg { background-color: rgba(72, 187, 120, 0.1); color: #c6f6d5; border: 1px solid rgba(72, 187, 120, 0.4); }
        .error-msg { background-color: rgba(245, 101, 101, 0.1); color: #fed7d7; border: 1px solid rgba(245, 101, 101, 0.4); }

        .loader { 
            display: none; 
            margin: 20px auto; 
            width: 40px; 
            height: 40px; 
            border: 4px solid rgba(0, 229, 255, 0.2); 
            border-radius: 50%; 
            border-top-color: var(--neon-blue); 
            animation: spinBorder 1s ease-in-out infinite; 
        }

        /* --- Animasyonlar --- */
        @keyframes twinkle { 0% { opacity: 0.4; } 100% { opacity: 0.9; } }
        @keyframes spinLogo { 100% { transform: rotate(360deg); } }
        @keyframes waveFlag { 0% { transform: skewY(0deg) scaleY(1); } 50% { transform: skewY(-2deg) scaleY(1.02); } 100% { transform: skewY(2deg) scaleY(0.98); } }
        @keyframes spinBorder { 100% { transform: rotate(360deg); } }
        @keyframes pulseGlow { 0% { text-shadow: 0 0 10px var(--gold-bright); } 100% { text-shadow: 0 0 25px var(--gold-bright), 0 0 35px #ffa500; } }

    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <div class="page-container">
        <header class="app-header">
            <img src="logo.gif" alt="Okul Logo" class="school-logo">
            <div>
                <h1 class="main-title">19 MAYIS ÖZEL</h1>
                <h2 class="sub-title">BİLİM VE GENÇLİK ŞENLİĞİ</h2>
            </div>
            <img src="image_abb96a.png" alt="Türk Bayrağı" class="turkish-flag">
        </header>

        <div class="animated-border-wrapper" id="kotaKutusu">
            <div class="animated-border-inner">
                <p class="info-text" id="kotaBilgisi">Günlük Kota Kontrol Ediliyor... ⏳</p>
            </div>
        </div>

        <div id="icerikAlani" style="display: none;">
            
            <div class="animated-border-wrapper wrapper-2">
                <div class="animated-border-inner project-panel">
                    <h1 id="projeBaslik">Yükleniyor...</h1>
                    <p id="ogrenciAdi">Lütfen bekleyin</p>
                </div>
            </div>

            <section class="star-rating-section">
                <div class="stars-container" id="starsContainer">
                    <span class="star" onclick="oyVer(1)">★</span>
                    <span class="star" onclick="oyVer(2)">★</span>
                    <span class="star" onclick="oyVer(3)">★</span>
                    <span class="star" onclick="oyVer(4)">★</span>
                    <span class="star" onclick="oyVer(5)">★</span>
                </div>
            </section>
        </div>

        <div class="loader" id="yukleniyor"></div>
        <div id="mesajAlani"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Kendi Firebase Config Kodlarınız
        const firebaseConfig = {
            apiKey: "AIzaSyBS-OSazqWy0IZyO0gkyvCHOVlDIa4EH3k",
            authDomain: "bilim-senligi-oylama.firebaseapp.com",
            projectId: "bilim-senligi-oylama",
            storageBucket: "bilim-senligi-oylama.firebasestorage.app",
            messagingSenderId: "759289316087",
            appId: "1:759289316087:web:885560206050005e6d49f2",
            measurementId: "G-83VDG3TC70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const projeId = urlParams.get('id');

        const kotaBilgisi = document.getElementById('kotaBilgisi');
        const icerikAlani = document.getElementById('icerikAlani');
        const projeBaslik = document.getElementById('projeBaslik');
        const ogrenciAdi = document.getElementById('ogrenciAdi');
        const mesajAlani = document.getElementById('mesajAlani');
        const yukleniyor = document.getElementById('yukleniyor');
        const kotaKutusu = document.getElementById('kotaKutusu');

        function getDurum() {
            const bugun = new Date().toLocaleDateString('tr-TR');
            let durum = JSON.parse(localStorage.getItem('senlikOylama'));
            
            if (!durum || durum.tarih !== bugun) {
                durum = { tarih: bugun, kalanHak: 2, oylananlar: [] };
                localStorage.setItem('senlikOylama', JSON.stringify(durum));
            }
            return durum;
        }

        function durumGuncelle(yeniDurum) {
            localStorage.setItem('senlikOylama', JSON.stringify(yeniDurum));
        }

        async function projeyiYukle() {
            if (!projeId) {
                hataGoster("⚠️ Geçersiz Karekod! Lütfen standdaki karekodu tekrar okutun.");
                return;
            }

            const durum = getDurum();
            
            if (durum.kalanHak <= 0) {
                hataGoster("🛑 Bugünkü tüm oy haklarınızı (2/2) kullandınız. Yarın tekrar bekleriz!");
                return;
            }

            if (durum.oylananlar.includes(projeId)) {
                hataGoster("👀 Bu projeye zaten oy verdiniz. Lütfen farklı projelere şans verin.");
                kotaBilgisi.innerText = `💡 Bugün için kalan oy hakkınız: ${durum.kalanHak}`;
                return;
            }

            kotaBilgisi.innerHTML = `🌟 Bugün için <b>${durum.kalanHak}</b> oy hakkınız var.`;

            try {
                const projeRef = doc(db, "projeler", projeId);
                const projeSnap = await getDoc(projeRef);

                if (projeSnap.exists()) {
                    projeBaslik.innerText = "Proje: " + projeSnap.data().proje_adi;
                    ogrenciAdi.innerText = "Öğrenci: " + projeSnap.data().ogrenci_adi;
                    icerikAlani.style.display = "block";
                } else {
                    hataGoster("❌ Proje bulunamadı. Silinmiş veya yayından kaldırılmış olabilir.");
                }
            } catch (error) {
                hataGoster("📶 Bağlantı hatası oluştu. Lütfen internetinizi kontrol edin.");
            }
        }

        function hataGoster(mesaj) {
            kotaKutusu.style.display = "none";
            icerikAlani.style.display = "none";
            mesajAlani.innerText = mesaj;
            mesajAlani.className = "error-msg";
            mesajAlani.style.display = "block";
        }

        function basariGoster(kalanHak) {
            icerikAlani.style.display = "none";
            kotaKutusu.style.display = "none";
            mesajAlani.innerHTML = `🎉 <b>Harika!</b> Oyunuz başarıyla eklendi!<br><br>Bugün için kalan oy hakkınız: <b>${kalanHak}</b>`;
            mesajAlani.className = "success-msg";
            mesajAlani.style.display = "block";
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#00e5ff', '#bd00ff', '#ffd700'] 
            });
        }

        // Yıldızlara Tıklama (Global window nesnesine ekliyoruz)
        window.oyVer = async function(puan) {
            const durum = getDurum();
            if (durum.kalanHak <= 0 || durum.oylananlar.includes(projeId)) return;

            // Görsel olarak yıldızları yak
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, index) => {
                if (index < puan) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });

            // Tıklamaları kilitle ve loader'ı göster
            document.getElementById('starsContainer').style.pointerEvents = 'none';
            yukleniyor.style.display = "block";

            try {
                const projeRef = doc(db, "projeler", projeId);
                
                await updateDoc(projeRef, {
                    toplam_ham_puan: increment(puan),
                    toplam_oy_sayisi: increment(1)
                });

                durum.kalanHak -= 1;
                durum.oylananlar.push(projeId);
                durumGuncelle(durum);

                yukleniyor.style.display = "none";
                basariGoster(durum.kalanHak);

            } catch (error) {
                console.error("Oy verme hatası:", error);
                yukleniyor.style.display = "none";
                alert("Oy verilirken bir hata oluştu. Lütfen tekrar deneyin.");
                document.getElementById('starsContainer').style.pointerEvents = 'auto';
            }
        };

        // Sayfa yüklendiğinde projeyi çek
        projeyiYukle();
    </script>
</body>
</html>
