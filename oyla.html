<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>19 Mayıs Bilim ve Gençlik Şenliği - Oylama</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Modern Gradient ve Hareketli Arka Plan */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
            background: linear-gradient(135deg, #090a1a 0%, #1c1f3d 50%, #30104a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Arka plan animasyonu için */
            position: relative;
        }

        /* Hareketli Neon Bilim İkonları Arka Planı */
        .bg-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0.15;
            z-index: 0;
            animation: moveIcons 60s linear infinite;
        }
        @keyframes moveIcons {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* Glassmorphism (Buzlu Cam) Efektli Kutu, Neon Vurgulu */
        .container { 
            background: rgba(10, 11, 27, 0.7);
            backdrop-filter: blur(15px);
            max-width: 420px; 
            width: 100%;
            padding: 40px 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            border: 2px solid rgba(13, 110, 253, 0.5); /* Neon Mavi Vurgu */
            position: relative;
            z-index: 1;
        }

        /* Tema Detayları: Atatürk ve Bayrak */
        .header-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .header-logo img.ataturk { height: 40px; opacity: 0.8; }
        .header-logo img.bayrak { height: 25px; opacity: 0.9; }

        h1 { color: #f8f9fa; font-size: 24px; margin-bottom: 5px; font-weight: 800; text-shadow: 0 0 10px rgba(13, 110, 253, 0.8); }
        .fest-sub { color: #fed7d7; font-size: 14px; margin-bottom: 30px; font-weight: 600; text-transform: uppercase; }
        .student-name { color: #cbd5e0; font-size: 16px; margin-bottom: 25px; font-weight: 500; }
        
        /* Şık ve Neon Kota Bilgi Kutusu */
        .info-box { 
            background: rgba(13, 110, 253, 0.1);
            color: #8ec5fc; 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 14px; 
            margin-bottom: 25px; 
            font-weight: bold; 
            border: 1px solid rgba(13, 110, 253, 0.6);
            box-shadow: 0 0 10px rgba(13, 110, 253, 0.2);
        }
        
        /* Google Play Tarzı Yıldızlı Puan Butonları */
        .vote-buttons { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 20px; 
        }
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 5px;
        }
        .star-rating input { display: none; }
        .star-rating label {
            position: relative;
            cursor: pointer;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        /* Yıldız İkonu */
        .star-rating label::before {
            content: '\2605'; /* Yıldız İkonu */
            font-size: 30px;
            color: rgba(255, 255, 255, 0.15);
            transition: all 0.2s;
            position: absolute;
            z-index: 1;
        }
        /* Ortadaki Rakam */
        .star-rating label::after {
            content: attr(data-puan);
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 800;
            position: absolute;
            z-index: 2;
        }

        /* Hover ve Seçilme Efektleri: Sağdan Sola */
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            background-color: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.6);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        .star-rating label:hover::before,
        .star-rating label:hover ~ label::before,
        .star-rating input:checked ~ label::before {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        .star-rating label:hover::after,
        .star-rating label:hover ~ label::after,
        .star-rating input:checked ~ label::after {
            color: #2d3748;
            text-shadow: none;
        }

        #mesajAlani { margin-top: 25px; font-size: 17px; font-weight: bold; display: none; padding: 15px; border-radius: 12px; }
        .success-msg { background-color: rgba(72, 187, 120, 0.1); color: #c6f6d5; border: 1px solid rgba(72, 187, 120, 0.4); }
        .error-msg { background-color: rgba(245, 101, 101, 0.1); color: #fed7d7; border: 1px solid rgba(245, 101, 101, 0.4); }
        
        /* Modern Yükleniyor Animasyonu: Atom Simge */
        .loader { 
            display: none; 
            margin: 30px auto; 
            width: 50px; 
            height: 50px; 
            border: 4px solid rgba(13, 110, 253, 0.2); 
            border-radius: 50%; 
            border-top-color: #ffd700; /* Yıldız Sarısı */
            animation: spin 1s ease-in-out infinite; 
            position: relative;
        }
        .loader::after {
            content: '\269B'; /* Atom İkonu */
            font-size: 25px;
            color: #8ec5fc;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spinRev 2s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spinRev { to { transform: translate(-50%, -50%) rotate(-360deg); } }
    </style>
</head>
<body>

<div class="bg-icons" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 opacity=%220.3%22%3E%3Cpath d=%22M10 10l8 8m-8 0l8-8%22 stroke=%22%238ec5fc%22 stroke-width=%221%22/%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%225%22 stroke=%22%23ffd700%22 stroke-width=%221%22/%3E%3Cpath d=%22M80 20l5 10m-5 0l5-10%22 stroke=%22%23e0c3fc%22 stroke-width=%221%22/%3E%3C/svg%3E');"></div>

<div class="container">
    <div class="header-logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Mustafa_Kemal_Atat%C3%BCrk_silhouette.svg" alt="Atatürk" class="ataturk">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b4/Flag_of_Turkey.svg" alt="Bayrak" class="bayrak">
    </div>
    <h1>19 MAYIS ÖZEL</h1>
    <div class="fest-sub">BİLİM VE GENÇLİK ŞENLİĞİ</div>

    <div id="kotaBilgisi" class="info-box">Günlük Kota Kontrol Ediliyor... ⏳</div>
    
    <div id="icerikAlani" style="display: none;">
        <h1 id="projeBaslik" style="font-size:22px; margin-bottom:10px;">Yükleniyor...</h1>
        <div id="ogrenciAdi" class="student-name">Lütfen bekleyin</div>

        <div class="vote-buttons">
            <div class="star-rating">
                <input type="radio" name="rating" id="star5" value="5"><label for="star5" data-puan="5"></label>
                <input type="radio" name="rating" id="star4" value="4"><label for="star4" data-puan="4"></label>
                <input type="radio" name="rating" id="star3" value="3"><label for="star3" data-puan="3"></label>
                <input type="radio" name="rating" id="star2" value="2"><label for="star2" data-puan="2"></label>
                <input type="radio" name="rating" id="star1" value="1"><label for="star1" data-puan="1"></label>
            </div>
        </div>
    </div>

    <div class="loader" id="yukleniyor"></div>
    <div id="mesajAlani"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Kendi Firebase Config Kodlarınız
    const firebaseConfig = {
        apiKey: "AIzaSyBS-OSazqWy0IZyO0gkyvCHOVlDIa4EH3k",
        authDomain: "bilim-senligi-oylama.firebaseapp.com",
        projectId: "bilim-senligi-oylama",
        storageBucket: "bilim-senligi-oylama.firebasestorage.app",
        messagingSenderId: "759289316087",
        appId: "1:759289316087:web:885560206050005e6d49f2",
        measurementId: "G-83VDG3TC70"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const projeId = urlParams.get('id');

    const kotaBilgisi = document.getElementById('kotaBilgisi');
    const icerikAlani = document.getElementById('icerikAlani');
    const projeBaslik = document.getElementById('projeBaslik');
    const ogrenciAdi = document.getElementById('ogrenciAdi');
    const mesajAlani = document.getElementById('mesajAlani');
    const yukleniyor = document.getElementById('yukleniyor');

    function getDurum() {
        const bugun = new Date().toLocaleDateString('tr-TR');
        let durum = JSON.parse(localStorage.getItem('senlikOylama'));
        
        if (!durum || durum.tarih !== bugun) {
            durum = { tarih: bugun, kalanHak: 2, oylananlar: [] };
            localStorage.setItem('senlikOylama', JSON.stringify(durum));
        }
        return durum;
    }

    function durumGuncelle(yeniDurum) {
        localStorage.setItem('senlikOylama', JSON.stringify(yeniDurum));
    }

    async function projeyiYukle() {
        if (!projeId) {
            hataGoster("⚠️ Geçersiz Karekod! Lütfen standdaki karekodu tekrar okutun.");
            return;
        }

        const durum = getDurum();
        
        if (durum.kalanHak <= 0) {
            hataGoster("🛑 Bugünkü tüm oy haklarınızı (2/2) kullandınız. Yarın tekrar bekleriz!");
            return;
        }

        if (durum.oylananlar.includes(projeId)) {
            hataGoster("👀 Bu projeye zaten oy verdiniz. Lütfen farklı projelere şans verin.");
            kotaBilgisi.innerText = `💡 Bugün için kalan oy hakkınız: ${durum.kalanHak}`;
            return;
        }

        kotaBilgisi.innerText = `🌟 Bugün için ${durum.kalanHak} oy hakkınız var.`;

        try {
            const projeRef = doc(db, "projeler", projeId);
            const projeSnap = await getDoc(projeRef);

            if (projeSnap.exists()) {
                projeBaslik.innerText = projeSnap.data().proje_adi;
                ogrenciAdi.innerText = projeSnap.data().ogrenci_adi;
                icerikAlani.style.display = "block";
            } else {
                hataGoster("❌ Proje bulunamadı. Silinmiş veya yayından kaldırılmış olabilir.");
            }
        } catch (error) {
            hataGoster("📶 Bağlantı hatası oluştu. Lütfen internetinizi kontrol edin.");
        }
    }

    function hataGoster(mesaj) {
        kotaBilgisi.style.display = "none";
        icerikAlani.style.display = "none";
        mesajAlani.innerText = mesaj;
        mesajAlani.className = "error-msg";
        mesajAlani.style.display = "block";
    }

    function basariGoster(kalanHak) {
        icerikAlani.style.display = "none";
        kotaBilgisi.style.display = "none";
        mesajAlani.innerHTML = `🎉 <b>Harika!</b> Oyunuz başarıyla eklendi!<br><br>Bugün için kalan oy hakkınız: <b>${kalanHak}</b>`;
        mesajAlani.className = "success-msg";
        mesajAlani.style.display = "block";
        
        // KONFETİ PATLATMA EFEKTİ
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#0d6efd', '#ffd700', '#ffffff'] /* Neon Mavi, Altın */
        });
    }

    // Yıldızlara Dokunma İşlemi
    document.querySelectorAll('.star-rating input').forEach(input => {
        input.addEventListener('change', async (e) => {
            const puan = parseInt(e.target.value);
            const durum = getDurum();

            if (durum.kalanHak <= 0 || durum.oylananlar.includes(projeId)) return;

            // Yıldızları kilitle ve atom yükleniyor animasyonunu aç
            document.querySelectorAll('.star-rating input').forEach(b => b.disabled = true);
            yukleniyor.style.display = "block";

            try {
                const projeRef = doc(db, "projeler", projeId);
                
                await updateDoc(projeRef, {
                    toplam_ham_puan: increment(puan),
                    toplam_oy_sayisi: increment(1)
                });

                durum.kalanHak -= 1;
                durum.oylananlar.push(projeId);
                durumGuncelle(durum);

                yukleniyor.style.display = "none";
                basariGoster(durum.kalanHak);

            } catch (error) {
                console.error("Oy verme hatası:", error);
                yukleniyor.style.display = "none";
                alert("Oy verilirken bir hata oluştu. Lütfen tekrar deneyin.");
                document.querySelectorAll('.star-rating input').forEach(b => b.disabled = false);
            }
        });
    });

    projeyiYukle();
</script>

</body>
</html>
