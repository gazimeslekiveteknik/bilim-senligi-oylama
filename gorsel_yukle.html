<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proje Görseli Yönetimi - Gazi MTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0b0f19; color: #f1f5f9; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .upload-box { background: rgba(20, 25, 45, 0.9); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #06b6d4; margin-top: 0; }
        select, input[type="file"], button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-family: 'Outfit'; box-sizing: border-box; font-size: 15px; }
        select option { background: #0b0f19; color: white; }
        
        .btn-upload { background: #3b82f6; color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn-upload:hover { background: #2563eb; }
        
        .btn-delete { background: rgba(227, 10, 23, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-delete:hover { background: #ef4444; color: white; }

        #previewImage { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; margin-top: 15px; display: none; border: 2px solid #06b6d4; }
        .info-text { font-size: 12px; color: #94a3b8; margin-top: 10px; text-align: left; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="upload-box">
        <h2>📷 Proje Görseli Yükle</h2>
        <p style="font-size: 13px; color: #94a3b8;">Lütfen projenizi seçin ve standınızı anlatan 1 adet yatay görsel yükleyin.</p>
        
        <select id="projectSelect">
            <option value="">-- Projenizi Seçin --</option>
            </select>

        <input type="file" id="fileInput" accept="image/*">
        
        <img id="previewImage" alt="Önizleme">

        <button id="uploadBtn" class="btn-upload">Görseli Kaydet / Değiştir</button>
        <button id="deleteBtn" class="btn-delete">Mevcut Görseli Sil</button>

        <div class="info-text">
            💡 <b>Yanlış resim mi yüklediniz?</b> Hiç sorun değil! Doğru resmi seçip tekrar "Kaydet" butonuna basarsanız eski resim otomatik olarak yenisiyle değiştirilir.
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBS-OSazqWy0IZyO0gkyvCHOVlDIa4EH3k", authDomain: "bilim-senligi-oylama.firebaseapp.com", projectId: "bilim-senligi-oylama",
            storageBucket: "bilim-senligi-oylama.firebasestorage.app", messagingSenderId: "759289316087", appId: "1:759289316087:web:885560206050005e6d49f2"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // IMGBB API ANAHTARINIZI BURAYA YAPIŞTIRIN:
        const IMGBB_API_KEY = "BURAYA_IMGBB_API_ANAHTARINIZI_YAZIN";

        const projectSelect = document.getElementById('projectSelect');
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');

        // Projeleri Çek
        async function loadProjects() {
            try {
                const q = query(collection(db, "projeler"), orderBy("proje_adi", "asc"));
                const querySnapshot = await getDocs(q);
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const option = document.createElement('option');
                    option.value = docSnap.id;
                    option.textContent = `${data.proje_adi} (${data.ogrenci_adi})`;
                    projectSelect.appendChild(option);
                });
            } catch (e) {
                Swal.fire('Hata', 'Projeler yüklenemedi.', 'error');
            }
        }
        loadProjects();

        // Önizleme
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewImage.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        // GÖRSEL YÜKLEME / GÜNCELLEME İŞLEMİ
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const projectId = projectSelect.value;
            const file = fileInput.files[0];

            if (!projectId) return Swal.fire('Uyarı', 'Lütfen projenizi seçin.', 'warning');
            if (!file) return Swal.fire('Uyarı', 'Lütfen bir görsel seçin.', 'warning');
            if (IMGBB_API_KEY === "BURAYA_IMGBB_API_ANAHTARINIZI_YAZIN") return Swal.fire('Hata', 'API anahtarı eksik.', 'error');

            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.innerText = "Yükleniyor... Lütfen bekleyin.";

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                
                const result = await response.json();

                if (result.success) {
                    const imageUrl = result.data.url;
                    
                    // Firebase'i yeni linkle güncelle
                    await updateDoc(doc(db, "projeler", projectId), { resim_url: imageUrl });
                    
                    Swal.fire('Başarılı!', 'Görsel başarıyla kaydedildi.', 'success').then(() => {
                        window.location.reload();
                    });
                } else {
                    Swal.fire('Hata', 'Görsel yüklenirken sunucu hatası oluştu.', 'error');
                    btn.disabled = false;
                    btn.innerText = "Görseli Kaydet / Değiştir";
                }

            } catch (error) {
                Swal.fire('Hata', 'İnternet bağlantınızı kontrol edin.', 'error');
                btn.disabled = false;
                btn.innerText = "Görseli Kaydet / Değiştir";
            }
        });

        // GÖRSEL SİLME İŞLEMİ
        document.getElementById('deleteBtn').addEventListener('click', async () => {
            const projectId = projectSelect.value;
            
            if (!projectId) return Swal.fire('Uyarı', 'Lütfen görselini silmek istediğiniz projenizi seçin.', 'warning');

            Swal.fire({
                title: 'Görsel Silinecek',
                text: "Bu projenin mevcut görselini sistemden kaldırmak istediğinize emin misiniz?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#3b82f6',
                confirmButtonText: 'Evet, Sil',
                cancelButtonText: 'İptal'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        // Resim URL bilgisini veritabanından tamamen temizler (boş metin yapar)
                        await updateDoc(doc(db, "projeler", projectId), { resim_url: "" });
                        Swal.fire('Silindi!', 'Proje görseli sistemden kaldırıldı.', 'success').then(() => {
                            window.location.reload();
                        });
                    } catch (error) {
                        Swal.fire('Hata', 'Silme işlemi sırasında hata oluştu.', 'error');
                    }
                }
            });
        });
    </script>
</body>
</html>
