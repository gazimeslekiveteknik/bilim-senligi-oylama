<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilim Şenliği - Yönetici Paneli</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1,
        h2 {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #218838;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .project-card {
            border: 1px solid #eee;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            background-color: #fafafa;
        }

        .qr-image {
            max-width: 150px;
            margin: 10px 0;
        }

        .print-btn {
            background-color: #007bff;
            margin-top: 10px;
            padding: 5px 10px;
            font-size: 14px;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .print-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🔬 Bilim Şenliği - Yönetici Paneli</h1>
        <p>Yeni bir proje eklediğinizde sistem otomatik olarak o projeye ait karekodu üretecektir.</p>

        <div class="form-group">
            <input type="text" id="projeAdi" placeholder="Proje Adı (Örn: Güneş Enerjili Sulama)" required>
        </div>
        <div class="form-group">
            <input type="text" id="ogrenciAdi" placeholder="Öğrenci veya Grup Adı" required>
        </div>
        <button id="ekleBtn">Projeyi Ekle ve Karekod Üret</button>

        <hr style="margin: 30px 0;">

        <h2>Stand Karekodları</h2>
        <div class="project-grid" id="projeListesi">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Kendi Firebase Config Kodlarınız (Sizin tarafınızdan sağlanan)
        const firebaseConfig = {
            apiKey: "AIzaSyBS-OSazqWy0IZyO0gkyvCHOVlDIa4EH3k",
            authDomain: "bilim-senligi-oylama.firebaseapp.com",
            projectId: "bilim-senligi-oylama",
            storageBucket: "bilim-senligi-oylama.firebasestorage.app",
            messagingSenderId: "759289316087",
            appId: "1:759289316087:web:885560206050005e6d49f2",
            measurementId: "G-83VDG3TC70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // VERCEL ADRESİNİZ (Karekodlar bu adrese yönlendirecek)
        const siteUrl = "https://bilim-senligi-oylama.vercel.app/oyla.html";

        const ekleBtn = document.getElementById('ekleBtn');
        const projeListesi = document.getElementById('projeListesi');

        // Projeleri Ekrana Yazdırma Fonksiyonu
        async function projeleriGetir() {
            projeListesi.innerHTML = "<em>Projeler yükleniyor...</em>";
            const querySnapshot = await getDocs(collection(db, "projeler"));
            projeListesi.innerHTML = "";

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const projeId = doc.id;
                const oylamaLinki = `${siteUrl}?id=${projeId}`;

                // Karekod üretmek için ücretsiz ve pratik bir API kullanıyoruz
                const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(oylamaLinki)}`;

                projeListesi.innerHTML += `
                <div class="project-card">
                    <h3 style="margin-top:0;">${data.proje_adi}</h3>
                    <p style="color: #666; font-size: 14px; margin-bottom:10px;">${data.ogrenci_adi}</p>
                    <img src="${qrApiUrl}" alt="Karekod" class="qr-image">
                    <br>
                    <button class="print-btn" onclick="window.print()">Karekodu Yazdır</button>
                </div>
            `;
            });
        }

        // Yeni Proje Ekleme İşlemi
        ekleBtn.addEventListener('click', async () => {
            const pAdi = document.getElementById('projeAdi').value;
            const oAdi = document.getElementById('ogrenciAdi').value;

            if (pAdi === "" || oAdi === "") {
                alert("Lütfen proje ve öğrenci adını boş bırakmayın!");
                return;
            }

            ekleBtn.disabled = true;
            ekleBtn.innerText = "Ekleniyor...";

            try {
                await addDoc(collection(db, "projeler"), {
                    proje_adi: pAdi,
                    ogrenci_adi: oAdi,
                    toplam_ham_puan: 0,
                    toplam_oy_sayisi: 0,
                    eklenme_tarihi: new Date()
                });

                document.getElementById('projeAdi').value = "";
                document.getElementById('ogrenciAdi').value = "";
                await projeleriGetir(); // Listeyi yenile
            } catch (e) {
                console.error("Hata: ", e);
                alert("Eklenirken bir hata oluştu.");
            } finally {
                ekleBtn.disabled = false;
                ekleBtn.innerText = "Projeyi Ekle ve Karekod Üret";
            }
        });

        // Sayfa açıldığında mevcut projeleri yükle
        projeleriGetir();
    </script>

</body>

</html>
